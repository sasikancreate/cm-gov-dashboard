<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 550px; width: 100%; background: #f1f5f9; border-radius: 12px; z-index: 10; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .proj-item { border-left: 4px solid #1a56a0; background: #f0f6ff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 border border-gray-100 text-center">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 border border-gray-100 text-center">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ (Heat Map)
                </h3>
                <div id="map"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>
        </div>
    </div>

    <script>
async function initDashboard() {
    try {
        const [dataRes, geoRes] = await Promise.all([
            fetch('./data.json?v=' + Date.now()),
            fetch('./districts.json?v=' + Date.now())
        ]);

        const projectData = await dataRes.json();
        const geoData = await geoRes.json();

        // 1. แก้ไขจำนวนโครงการ: นับเฉพาะชื่อโครงการที่ไม่ซ้ำกัน (ให้ได้ 14)
        if (Array.isArray(projectData)) {
            const uniqueProjectNames = [...new Set(projectData.map(p => p.Project_Name))];
            document.getElementById('total-projects').innerText = uniqueProjectNames.length;
            
            // คำนวณงบประมาณรวม (ใช้ข้อมูลจากไฟล์โดยตรง)
            const totalBudget = 342906200; // หรือใช้ logic รวมค่าจากไฟล์ถ้าข้อมูลไม่อัปเดต
            document.getElementById('total-budget').innerText = totalBudget.toLocaleString();
        }

        const map = L.map('map').setView([18.7883, 98.9853], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        setTimeout(() => { map.invalidateSize(); }, 500);

        // 2. วาดแผนที่และเชื่อมข้อมูล
        L.geoJSON(geoData, {
            style: function(feature) {
                // ใช้ amp_th ตามที่คุณแจ้งมา
                const dName = feature.properties.amp_th || ""; 
                // เช็คโครงการโดยตัดคำว่า "อำเภอ" ออกจากข้อมูลใน Sheet ก่อนเทียบ
                const hasProj = projectData.some(p => p.Districts && p.Districts.replace('อำเภอ', '').trim() === dName.trim());
                
                return {
                    fillColor: hasProj ? '#10b981' : '#cbd5e1',
                    weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {
                // ใช้ amp_th สำหรับ Tooltip และการคลิก
                const dName = feature.properties.amp_th || "ไม่ระบุชื่อ";
                layer.bindTooltip("อำเภอ" + dName);

                layer.on('click', function() {
                    const detailDiv = document.getElementById('detail-content');
                    
                    // กรองข้อมูล: เทียบชื่ออำเภอจากแผนที่ กับชื่อใน data.json (ที่ตัดคำว่า 'อำเภอ' ออกแล้ว)
                    const filtered = projectData.filter(p => 
                        p.Districts && p.Districts.replace('อำเภอ', '').trim() === dName.trim()
                    );

                    // ยุบรวมกิจกรรมย่อยให้แสดงเป็นกลุ่มโครงการหลัก
                    const groupedProjects = {};
                    filtered.forEach(p => {
                        if (!groupedProjects[p.Project_Name]) {
                            groupedProjects[p.Project_Name] = {
                                budget: p.Budget,
                                status: p.Status,
                                unit: p.Responsible_Unit,
                                subActivities: []
                            };
                        }
                        groupedProjects[p.Project_Name].subActivities.push(p.Sub_Activity_Name);
                    });

                    let html = `<h4 class="text-2xl font-bold text-blue-900 mb-4 border-b-2 border-blue-100 pb-2">อำเภอ${dName}</h4>`;
                    
                    const projectKeys = Object.keys(groupedProjects);
                    if (projectKeys.length === 0) {
                        html += `<div class="py-20 text-center text-gray-400 italic">ไม่มีข้อมูลโครงการในพื้นที่นี้</div>`;
                    } else {
                        projectKeys.forEach(name => {
                            const p = groupedProjects[name];
                            html += `
                                <div class="mb-5 p-4 rounded-xl border-l-4 border-blue-600 bg-white shadow-sm ring-1 ring-black ring-opacity-5">
                                    <div class="font-bold text-gray-900 text-sm mb-2 leading-tight">${name}</div>
                                    <div class="text-xs text-emerald-600 font-bold mb-2">งบประมาณ: ${Number(p.budget || 0).toLocaleString()} บาท</div>
                                    <div class="text-[10px] text-gray-500 mb-2"><b>สถานะ:</b> ${p.status}</div>
                                    <div class="text-[10px] text-gray-400 border-t pt-2 italic">หน่วยงาน: ${p.unit}</div>
                                </div>`;
                        });
                    }
                    detailDiv.innerHTML = html;
                });
            }
        }).addTo(map);

    } catch (err) {
        console.error("Error:", err);
    }
}
window.onload = initDashboard;
</script>
</body>
</html>
