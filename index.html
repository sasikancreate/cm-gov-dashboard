<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 550px; width: 100%; background: #f1f5f9; border-radius: 12px; z-index: 10; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .proj-item { border-left: 4px solid #1a56a0; background: #f0f6ff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 border border-gray-100 text-center">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 border border-gray-100 text-center">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ (Heat Map)
                </h3>
                <div id="map"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        async function initDashboard() {
            try {
                // 1. โหลดข้อมูล (ใส่ v= ป้องกัน Cache)
                const [dataRes, geoRes] = await Promise.all([
                    fetch('./data.json?v=' + Date.now()),
                    fetch('./districts.json?v=' + Date.now())
                ]);

                if (!dataRes.ok || !geoRes.ok) throw new Error("โหลดไฟล์ JSON ไม่สำเร็จ");

                const projectData = await dataRes.json();
                const geoData = await geoRes.json();

                // 2. อัปเดตตัวเลขสรุปอัตโนมัติ (ถ้ามีข้อมูล)
                // อัปเดตตัวเลขสรุปอัตโนมัติ
                if (Array.isArray(projectData)) {
                // กรองเฉพาะรายชื่อโครงการที่ไม่ซ้ำกัน
                const uniqueProjects = [...new Set(projectData.map(p => p.Project_Name))];
                document.getElementById('total-projects').innerText = uniqueProjects.length; // จะได้ 14 โครงการ
    
                // คำนวณงบประมาณ (ถ้างบประมาณใน JSON เป็นรายโครงการหลักอยู่แล้ว)
                // แต่ถ้าใน JSON เป็นงบรายกิจกรรมย่อย ให้ระวังการบวกซ้ำนะครับ
                const total = projectData.reduce((sum, p) => sum + (Number(p.Budget) || 0), 0);
                document.getElementById('total-budget').innerText = total.toLocaleString();
            }

                // 3. สร้างแผนที่
                const map = L.map('map').setView([18.7883, 98.9853], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                setTimeout(() => { map.invalidateSize(); }, 500);

                // 4. วาด GeoJSON และกำหนดฟังก์ชัน
                L.geoJSON(geoData, {
                    style: function(feature) {
                        const dName = feature.properties.amphoe_th || "";
                        // ค้นหาว่าอำเภอนี้มีโครงการไหม (เพื่อระบายสี)
                        const hasProj = projectData.some(p => p.Districts && p.Districts.includes(dName.replace('อำเภอ','')));
                        return {
                            fillColor: hasProj ? '#10b981' : '#cbd5e1',
                            weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        // พยายามดึงชื่ออำเภอจากฟิลด์ต่างๆ ที่เป็นไปได้
                        const dName = feature.properties.amphoe_th || feature.properties.NAME_2 || feature.properties.name || "ไม่ระบุชื่อ";
    
                        layer.bindTooltip("อำเภอ" + dName);

                        layer.on('click', function() {
                            const detailDiv = document.getElementById('detail-content');
                            const cleanName = dName.replace('อำเภอ', '').trim(); // ลบคำว่า 'อำเภอ' ออกเพื่อใช้เทียบข้อมูล
        
                            // กรองโครงการหลัก (โดยไม่นับกิจกรรมย่อยซ้ำ)
                            const filtered = projectData.filter(p => p.Districts && p.Districts.includes(cleanName));
        
                            // กรองเอาเฉพาะโครงการหลักที่ไม่ซ้ำชื่อกันเพื่อมาแสดงหัวข้อ
                            const uniqueInDistrict = [];
                            const map = new Map();
                            for (const item of filtered) {
                                if(!map.has(item.Project_Name)){
                                    map.set(item.Project_Name, true);
                                    uniqueInDistrict.push(item);
                                }
                            }

                            let html = `<h4 class="text-xl font-bold text-blue-900 mb-4">อำเภอ${dName}</h4>`;
        
                            if (uniqueInDistrict.length === 0) {
                                html += `<p class="text-gray-400 italic">ไม่มีโครงการในพื้นที่นี้</p>`;
                            } else {
                                uniqueInDistrict.forEach(p => {
                                    html += `
                                        <div class="proj-item" style="border-left: 4px solid #1a56a0; background: #f0f6ff; padding: 12px; border-radius: 8px; margin-bottom: 10px;">
                                            <div class="font-bold text-sm text-gray-800">${p.Project_Name}</div>
                                            <div class="text-xs text-blue-600 mt-1 font-semibold">งบประมาณ: ${Number(p.Budget || 0).toLocaleString()} บาท</div>
                                            <div class="text-[10px] text-gray-500 mt-1">สถานะ: ${p.Status}</div>
                                            <div class="text-[10px] text-gray-400 mt-1 italic">หน่วยงาน: ${p.Responsible_Unit}</div>
                                        </div>`;
                                });
                            }
                            detailDiv.innerHTML = html;
                        });
                    }

            } catch (err) {
                console.error("ผิดพลาด:", err);
                document.getElementById('map').innerHTML = `<div class="p-10 text-red-500 text-center">แผนที่หาย! สาเหตุ: ${err.message}</div>`;
            }
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
