<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { 
            height: 550px; 
            width: 100%; 
            background: #f1f5f9; 
            border-radius: 12px; 
            z-index: 10; 
        }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ (Heat Map)
                </h3>
                <div id="map"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
async function initDashboard() {
    try {
        const mapElement = document.getElementById('map');
        if (!mapElement) {
            console.error("หาพื้นที่วาดแผนที่ id='map' ไม่เจอ");
            return;
        }

        // 1. สร้างแผนที่รอก่อน (พิกัดเชียงใหม่)
        const map = L.map('map').setView([18.7883, 98.9853], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // บังคับคำนวณขนาดกรอบแผนที่ใหม่ (กันปัญหาแผนที่แหว่ง)
        setTimeout(() => { map.invalidateSize(); }, 500);

        // 2. ดึงข้อมูลพิกัดอำเภอ (districts.json)
        const geoRes = await fetch('./districts.json');
        if (!geoRes.ok) throw new Error("โหลดไฟล์ districts.json ไม่สำเร็จ (เช็คชื่อไฟล์บน GitHub)");
        const geoData = await geoRes.json();

        // 3. ดึงข้อมูลโครงการจาก Sheet (data.json)
        const dataRes = await fetch('./data.json');
        let projectData = [];
        if (dataRes.ok) {
            projectData = await dataRes.json();
            // อัปเดตตัวเลขสรุปด้านบนอัตโนมัติ
            if (document.getElementById('total-projects')) {
                document.getElementById('total-projects').innerText = projectData.length;
            }
        } else {
            console.warn("โหลด data.json ไม่สำเร็จ แผนที่จะแสดงเฉพาะขอบเขตอำเภอ");
        }

        // 4. วาดแผนที่อำเภอ
        L.geoJSON(geoData, {
            style: function(feature) {
                // อ้างอิงชื่ออำเภอจากไฟล์ districts.json (amphoe_th)
                const dName = feature.properties.amphoe_th || "";
                
                // ค้นหาข้อมูลโครงการที่ตรงกับชื่ออำเภอนี้
                const hasProject = projectData.some(p => p.Districts && p.Districts.includes(dName));

                return {
                    fillColor: hasProject ? '#10b981' : '#cbd5e1', // เขียวถ้ามีงาน, เทาถ้าไม่มี
                    weight: 1.5,
                    opacity: 1,
                    color: 'white',
                    fillOpacity: 0.7
                };
            },
            onEachFeature: function(feature, layer) {
                const dName = feature.properties.amphoe_th || "ไม่ระบุชื่อ";
                layer.bindTooltip("อำเภอ" + dName);

                layer.on('click', function() {
                    const detailDiv = document.getElementById('detail-content');
                    const filtered = projectData.filter(p => p.Districts && p.Districts.includes(dName));

                    let html = `<h4 class="text-xl font-bold text-blue-900 mb-2">อำเภอ${dName}</h4>`;
                    if (filtered.length > 0) {
                        filtered.forEach(p => {
                            html += `<div class="p-3 mb-2 bg-blue-50 border-l-4 border-blue-500 rounded text-sm">
                                        <b>${p.Project_Name}</b><br>
                                        <span class="text-xs text-gray-600">สถานะ: ${p.Status}</span>
                                     </div>`;
                        });
                    } else {
                        html += `<p class="text-gray-400 italic">ไม่มีโครงการในพื้นที่นี้</p>`;
                    }
                    detailDiv.innerHTML = html;
                });
            }
        }).addTo(map);

        console.log("แผนที่และข้อมูลโครงการเชื่อมต่อสำเร็จ!");

    } catch (err) {
        console.error("เกิดข้อผิดพลาด:", err);
        // แสดงข้อความแจ้งเตือนบนหน้าเว็บเพื่อให้คุณเห็นว่าติดตรงไหน
        const mapErr = document.getElementById('map');
        if (mapErr) mapErr.innerHTML = `<div class="p-10 text-red-500 text-center font-bold">ไม่สามารถโหลดแผนที่ได้: ${err.message}</div>`;
    }
}

// เรียกใช้งานเมื่อหน้าจอโหลดเสร็จ
window.addEventListener('load', initDashboard);
</script>
</body>
</html>
