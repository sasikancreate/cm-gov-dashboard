<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { 
            height: 550px; 
            width: 100%; 
            background: #f1f5f9; 
            border-radius: 12px; 
            z-index: 10; 
        }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ (Heat Map)
                </h3>
                <div id="map"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
async function initDashboard() {
    try {
        // 1. โหลดข้อมูลโครงการและพิกัดแผนที่พร้อมกัน
        const [dataRes, geoRes] = await Promise.all([
            fetch('data.json?v=' + Date.now()),
            fetch('districts.json?v=' + Date.now())
        ]);

        if (!dataRes.ok || !geoRes.ok) throw new Error("ไม่สามารถโหลดไฟล์ข้อมูลได้");

        const projectData = await dataRes.json();
        const geoData = await geoRes.json();

        // 2. ตั้งค่าแผนที่ใน id="map" (พิกัดกลางเชียงใหม่)
        const map = L.map('map').setView([18.7883, 98.9853], 8);
        
        // บังคับให้แผนที่คำนวณขนาดใหม่เพื่อให้แสดงผลเต็มกรอบ
        setTimeout(() => { map.invalidateSize(); }, 500);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. ฟังก์ชันกำหนดสี (Heat Map) ตามสถานะโครงการ
        function getDistrictStyle(feature) {
            // ดึงชื่ออำเภอจากไฟล์ districts.json (ฟิลด์ amphoe_th)
            const dName = feature.properties.amphoe_th || "";
            // กรองข้อมูลโครงการในอำเภอนั้น (ใช้ .includes เพื่อความแม่นยำ)
            const districtProjects = projectData.filter(p => p.Districts && p.Districts.includes(dName));
            
            let color = '#f1f5f9'; // สีเทา (ไม่มีโครงการ)
            if (districtProjects.length > 0) {
                // เช็คว่ามีโครงการที่ "ลงนาม" หรือ "ดำเนินการ" หรือยัง
                const isStarted = districtProjects.some(p => 
                    p.Status.includes('ดำเนินการ') || p.Status.includes('ลงนาม') || p.Status.includes('GFMIS')
                );
                color = isStarted ? '#10b981' : '#f59e0b'; // เขียวถ้าเริ่มแล้ว, ส้มถ้ายังไม่เริ่ม
                
                // ถ้ามีโครงการที่ "ยกเลิก" ให้เน้นสีแดงเข้ม
                if (districtProjects.some(p => p.Status.includes('ยกเลิก'))) color = '#ef4444';
            }

            return {
                fillColor: color,
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        // 4. วาดแผนที่และใส่ฟังก์ชันคลิก
        L.geoJSON(geoData, {
            style: getStyle,
            onEachFeature: function(feature, layer) {
                const dName = feature.properties.amphoe_th || "ไม่ระบุชื่อ";
                layer.bindTooltip("อำเภอ" + dName);

                layer.on('click', function() {
                    const detailDiv = document.getElementById('detail-content');
                    const filtered = projectData.filter(p => p.Districts && p.Districts.includes(dName));

                    let html = `<h4 class="d-title">อำเภอ${dName}</h4>`;
                    html += `<div class="d-chips">
                                <div class="chip">ทั้งหมด <strong>${filtered.length}</strong> โครงการ</div>
                             </div>`;
                    
                    if (filtered.length === 0) {
                        html += `<div class="empty"><p>ไม่มีข้อมูลโครงการในพื้นที่นี้</p></div>`;
                    } else {
                        filtered.forEach(p => {
                            html += `
                                <div class="proj-group">
                                    <div class="proj-head">
                                        <div class="proj-name">${p.Project_Name}</div>
                                        <div class="proj-budget">งบประมาณ: ${Number(p.Budget || 0).toLocaleString()} บาท</div>
                                        <div class="text-[10px] mt-1 text-gray-500">สถานะ: ${p.Status}</div>
                                    </div>
                                </div>`;
                        });
                    }
                    detailDiv.innerHTML = html;
                });
            }
        }).addTo(map);

        console.log("Dashboard พร้อมใช้งาน");

    } catch (err) {
        console.error("แผนที่โหลดไม่สำเร็จ:", err);
        document.getElementById('map').innerHTML = `<div class="empty"><p>ไม่สามารถโหลดแผนที่ได้: ${err.message}</p></div>`;
    }
}

// เริ่มทำงานเมื่อหน้าเว็บพร้อม
window.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
