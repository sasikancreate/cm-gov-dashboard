<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { 
    height: 550px; 
    width: 100%;
    background: #f8fafc; /* สีพื้นหลังระหว่างรอโหลด */
    border-radius: 12px; 
    z-index: 1; 
}
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ
                </h3>
                <div id="map" class="bg-gray-100 w-full"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        async function initDashboard() {
            try {
                // โหลดข้อมูล (ตรวจสอบชื่อไฟล์ให้ตรงกับใน GitHub)
                const [dataRes, geoRes] = await Promise.all([
                    fetch('data.json'),
                    fetch('districts.json')
                ]);
                const projects = await dataRes.json();
                const geoData = await geoRes.json();

                // สร้างแผนที่ (ID 'map' จะตรงกับ div ข้างบน)
                const map = L.map('map').setView([18.7883, 98.9853], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // ฟังก์ชันกำหนดสี (Heat Map Logic)
                function getStyle(feature) {
                    const dName = feature.properties.amphoe_th || feature.properties.NAME_2;
                    // ลองสุ่มสีหรือเช็คสถานะจากข้อมูลจริง
                    return {
                        fillColor: '#3b82f6', 
                        weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                    };
                }

                // วาดแผนที่
                L.geoJSON(geoData, {
                    style: getStyle,
                    onEachFeature: function(feature, layer) {
                        const dName = feature.properties.amphoe_th || feature.properties.NAME_2;
                        layer.on('click', function() {
                            const detailDiv = document.getElementById('detail-content');
                            detailDiv.innerHTML = `<h4 class="text-xl font-bold text-blue-900 mb-4">${dName}</h4>`;
                            // เพิ่ม Logic กรองข้อมูลโครงการตรงนี้
                        });
                    }
                }).addTo(map);

            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        // เริ่มทำงานเมื่อโหลดหน้าเสร็จ
        window.addEventListener('load', initDashboard);
    </script><script>
    async function initDashboard() {
        try {
            // โหลดข้อมูล
            const [dataRes, geoRes] = await Promise.all([
                fetch('data.json'),
                fetch('districts.json')
            ]);
            
            const projects = await dataRes.json();
            const geoData = await geoRes.json();

            // สร้างแผนที่ใน id="map"
            const map = L.map('map').setView([18.7883, 98.9853], 8);
            
            // เพิ่มคำสั่งนี้เพื่อให้แผนที่คำนวณขนาดใหม่ทันที
            setTimeout(() => {
                map.invalidateSize();
            }, 500);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            L.geoJSON(geoData, {
                style: {
                    fillColor: '#3b82f6', 
                    weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                }
            }).addTo(map);

        } catch (err) {
            console.error("แผนที่โหลดไม่สำเร็จ เพราะ:", err);
        }
    }

    // เรียกใช้เมื่อหน้าเว็บพร้อม
    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
