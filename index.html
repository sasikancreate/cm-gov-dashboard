<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 600px; width: 100%; background: white; border-radius: 24px; z-index: 10; border: 1px solid #e2e8f0; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .info.legend { padding: 15px; font-size: 12px; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-radius: 15px; line-height: 20px; color: #334155; border: 1px solid #e2e8f0; }
        .info.legend i { width: 18px; height: 18px; float: left; margin-right: 10px; opacity: 0.9; border-radius: 4px; }
        .legend-title { font-weight: 700; margin-bottom: 8px; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="project-modal" class="fixed inset-0 z-[9999] hidden bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden shadow-2xl flex flex-col relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 p-2 bg-white/80 hover:bg-gray-200 rounded-full shadow-md">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-body" class="overflow-y-auto p-6 md:p-12 bg-slate-50"></div>
            <div class="p-4 bg-white border-t flex justify-center">
                <button onclick="closeModal()" class="px-12 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-700 shadow-lg">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-4xl font-black text-center text-slate-900 mb-10 tracking-tight">Dashboard ติดตามผลการดำเนินงานแผนปฏิบัติราชการ ปีงบประมาณ 2568</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">จำนวนโครงการหลัก (Project Master)</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">งบประมาณรวมทั้งสิ้น</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-5xl font-black text-emerald-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">บาท</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-white p-6 rounded-[40px] shadow-sm border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800 flex items-center gap-3">
                <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                แผนที่แสดงผลรายอำเภอ (คลิกเพื่อดูรายละเอียดโครงการ)
            </h3>
            <div id="map"></div>
        </div>
    </div>

    <script>
    function getColor(d) {
        return d >= 100 ? '#10b981' : d >= 80 ? '#34d399' : d >= 60 ? '#fbbf24' :
               d >= 40  ? '#fb923c' : d >= 20 ? '#f87171' : d >= 1 ? '#ef4444' : '#94a3b8';
    }

    function getProgressValue(s) {
        if (!s) return 0;
        if (s.includes("GFMIS")) return 100;
        if (s.includes("ลงนาม")) return 90;
        if (s.includes("ประกาศผลผู้ชนะ")) return 80;
        if (s.includes("ดำเนินการ")) return 50;
        if (s.includes("ร่างขอบเขต")) return 20;
        return 10;
    }

    function openModal(htmlContent) {
        document.getElementById('modal-body').innerHTML = htmlContent;
        document.getElementById('project-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('project-modal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    async function initDashboard() {
        try {
            const [dataRes, geoRes] = await Promise.all([
                fetch('./data.json?v=' + Date.now()),
                fetch('./districts.json?v=' + Date.now())
            ]);
            
            const rawData = await dataRes.json();
            const geoData = await geoRes.json();

            // ข้อมูลโครงการจาก data.json
            const projectData = Array.isArray(rawData) ? rawData : (rawData.Sheet1 || []);

            // นับจำนวนโครงการที่ไม่ซ้ำจาก Project_ID ให้ได้ 14 โครงการ
            const uniqueProjectIDs = [...new Set(projectData.map(p => p.Project_ID))];
            document.getElementById('total-projects').innerText = uniqueProjectIDs.length;

            // รวมงบประมาณ (กรองเอาเฉพาะค่าที่มีตัวเลข)
            const totalBudgetSum = projectData.reduce((sum, p) => sum + (Number(p.Budget) || 0), 0);
            document.getElementById('total-budget').innerText = totalBudgetSum.toLocaleString();

            const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([18.82, 99.05], 8.3);
            
            L.geoJSON(geoData, {
                style: function(feature) {
                    // *** แก้ตรงนี้: ใช้ amp_th ให้ตรงกับ districts.json ***
                    const dName = (feature.properties.amp_th || "").trim();
                    const filtered = projectData.filter(p => 
                        p.Districts && p.Districts.replace('อำเภอ','').trim() === dName.replace('อำเภอ','').trim());
                    
                    let avg = 0;
                    if(filtered.length > 0) {
                        const total = filtered.reduce((sum, p) => sum + getProgressValue(p.Status), 0);
                        avg = total / filtered.length;
                    }
                    return { fillColor: getColor(avg), weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.85 };
                },
                onEachFeature: function(feature, layer) {
                    const dName = (feature.properties.amp_th || "ไม่ระบุ").trim();
                    layer.bindTooltip("อำเภอ " + dName);

                    layer.on('click', function() {
                        const cleanName = dName.replace('อำเภอ','').trim();
                        const filtered = projectData.filter(p => 
                            p.Districts && p.Districts.replace('อำเภอ','').trim() === cleanName);

                        const distBudget = filtered.reduce((sum, p) => sum + (Number(p.Budget) || 0), 0);
                        const avgDist = filtered.length > 0 ? Math.round(filtered.reduce((sum, p) => sum + getProgressValue(p.Status), 0) / filtered.length) : 0;

                        let html = `
                            <div class="bg-slate-900 p-10 rounded-[40px] text-white flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-left">
                                <div><h2 class="text-4xl font-black mb-1 italic">อำเภอ${dName}</h2><p class="opacity-60 text-sm">ข้อมูลโครงการตามแผนปี 2568</p></div>
                                <div class="flex items-center gap-3 bg-white/10 p-4 rounded-3xl"><span class="text-6xl font-black text-emerald-400">${avgDist}%</span><span class="text-xs font-bold opacity-60 leading-tight text-left">ความคืบหน้า<br>ภาพรวม</span></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-left">
                                <div class="bg-white p-8 rounded-[32px] border border-slate-100 flex items-center gap-6"><div class="p-4 bg-blue-50 rounded-2xl text-blue-600 font-black text-3xl">${filtered.length}</div><div><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest text-left">รายการย่อย</p><p class="font-bold text-slate-800 text-xl text-left">ในพื้นที่นี้</p></div></div>
                                <div class="bg-white p-8 rounded-[32px] border border-slate-100 flex items-center gap-6 text-left"><div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600 font-black text-2xl">฿</div><div class="text-left"><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest text-left">งบประมาณพื้นที่</p><p class="font-bold text-slate-800 text-xl text-left">${distBudget.toLocaleString()} บาท</p></div></div>
                            </div>
                            <div class="space-y-4">`;

                        filtered.forEach((p, idx) => {
                            const prog = getProgressValue(p.Status);
                            html += `
                                <div class="bg-white p-8 rounded-[32px] border border-slate-50 shadow-sm text-left">
                                    <h4 class="text-lg font-bold text-slate-800 mb-2 text-left">${p.Project_Name}</h4>
                                    <p class="text-sm text-slate-500 mb-4 text-left">${p.Sub_Activity || p.Main_Activity || ""}</p>
                                    <div class="flex flex-wrap gap-6 text-xs font-bold text-slate-500 mb-6 uppercase tracking-wider text-left">
                                        <div class="text-left">หน่วยงาน: <span class="text-slate-800">${p.Responsible_Unit}</span></div>
                                        <div class="text-left">งบประมาณ: <span class="text-slate-900">฿${(Number(p.Budget) || 0).toLocaleString()}</span></div>
                                    </div>
                                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-2 text-left"><div class="h-full" style="width:${prog}%; background-color:${getColor(prog)}"></div></div>
                                    <div class="flex justify-between text-[10px] font-black uppercase"><span class="text-slate-400 text-left">${p.Status}</span><span>${prog}%</span></div>
                                </div>`;
                        });
                        
                        if(filtered.length === 0) html += `<div class="p-20 text-center text-slate-400 font-bold">ไม่มีโครงการในพื้นที่นี้</div>`;
                        html += `</div>`;
                        openModal(html);
                    });
                }
            }).addTo(map);

            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'info legend');
                const grades = [0, 20, 50, 80, 100];
                const labels = ['รอดำเนินการ', 'ร่าง TOR', 'กำลังดำเนินการ', 'ประกาศผลผู้ชนะ', 'เบิกจ่าย GFMIS'];
                div.innerHTML = '<div class="legend-title">เกณฑ์สถานะโครงการ</div>';
                for (let i = 0; i < grades.length; i++) {
                    div.innerHTML += '<i style="background:' + getColor(grades[i]) + '"></i> ' + labels[i] + '<br>';
                }
                return div;
            };
            legend.addTo(map);

            map.fitBounds(L.geoJSON(geoData).getBounds(), { padding: [20, 20] });
        } catch (err) { console.error(err); }
    }
    window.onload = initDashboard;
    </script>
</body>
</html>
