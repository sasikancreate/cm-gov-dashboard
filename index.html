<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 600px; width: 100%; background: #f1f5f9; border-radius: 24px; z-index: 10; border: 1px solid #e2e8f0; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="project-modal" class="fixed inset-0 z-[9999] hidden bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden shadow-2xl flex flex-col relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 p-2 bg-white/80 hover:bg-gray-200 rounded-full shadow-md transition-all">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-body" class="overflow-y-auto p-6 md:p-12 bg-slate-50"></div>
            <div class="p-4 bg-white border-t flex justify-center">
                <button onclick="closeModal()" class="px-12 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-700 shadow-lg transition-all">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
       <h1 class="text-2xl md:text-4xl font-black text-center text-slate-900 mb-10 tracking-tight">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ 2568
       </h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">จำนวนโครงการหลัก</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">งบประมาณรวมทั้งสิ้น</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-5xl font-black text-emerald-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">บาท</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-white p-6 rounded-[40px] shadow-sm border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800 flex items-center gap-3">
                <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                แผนที่แสดงผลรายอำเภอ (Heat Map)
            </h3>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- ฟังก์ชันควบคุม Modal ---
        function openModal(htmlContent) {
            document.getElementById('modal-body').innerHTML = htmlContent;
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('project-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // ปิด Modal เมื่อคลิกพื้นหลัง
        window.onclick = function(event) {
            const modal = document.getElementById('project-modal');
            if (event.target == modal) closeModal();
        }

        async function initDashboard() {
            try {
                const [dataRes, geoRes] = await Promise.all([
                    fetch('./data.json?v=' + Date.now()),
                    fetch('./districts.json?v=' + Date.now())
                ]);

                if (!dataRes.ok || !geoRes.ok) throw new Error("โหลดไฟล์ JSON ไม่สำเร็จ");

                const projectData = await dataRes.json();
                const geoData = await geoRes.json();

                const uniqueNames = [...new Set(projectData.map(p => p.Project_Name))];
                document.getElementById('total-projects').innerText = uniqueNames.length;
                document.getElementById('total-budget').innerText = "342,906,200";

                const map = L.map('map').setView([18.7883, 98.9853], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                setTimeout(() => { map.invalidateSize(); }, 500);

function getColor(d) {
    return d >= 100 ? '#28A745' : // เขียวเข้ม
           d >= 90  ? '#85C88A' : // เขียวอ่อน
           d >= 80  ? '#A7D948' : // เขียวมะนาว
           d >= 70  ? '#F4D03F' : // เหลืองเข้ม
           d >= 60  ? '#FFF176' : // เหลืองสว่าง
           d >= 50  ? '#FFB74D' : // ส้มเหลือง
           d >= 30  ? '#FF8A65' : // ส้มแดง
           d >= 20  ? '#E57373' : // แดงส้ม
           d >= 10  ? '#EF9A9A' : // แดงอ่อน
                      '#6C757D';   // เทาดำ (0% หรือไม่มีข้อมูล)
}

L.geoJSON(geoData, {
    style: function(feature) {
        const dName = (feature.properties.amp_th || "").trim();
        // กรองข้อมูลจาก data.json โดยเทียบชื่ออำเภอ
        const districtProjects = projectData.filter(p => 
            p.Districts && p.Districts.replace('อำเภอ', '').trim() === dName
        );

        let avgProgress = 0;
        if (districtProjects.length > 0) {
            // คำนวณค่าเฉลี่ยผลการดำเนินงานของอำเภอนั้นๆ
            const totalProgress = districtProjects.reduce((sum, p) => {
                let pVal = 0;
                const s = p.Status || "";
                if (s.includes("GFMIS")) pVal = 100;
                else if (s.includes("ลงนามแล้วอยู่ระหว่างนำเข้า")) pVal = 90;
                else if (s.includes("ประกาศผลผู้ชนะ")) pVal = 80;
                else if (s.includes("อุทธรณ์ผล")) pVal = 70;
                else if (s.includes("ประกาศเชิญชวน")) pVal = 60;
                else if (s.includes("ดำเนินการ (In Progress)")) pVal = 50;
                else if (s.includes("รอการอนุมัติรายงานขอซื้อ")) pVal = 30;
                else if (s.includes("ร่างขอบเขตงาน") || s.includes("TOR")) pVal = 20;
                else if (s.includes("อนุมัติโครงการ")) pVal = 10;
                return sum + pVal;
            }, 0);
            avgProgress = totalProgress / districtProjects.length;
        }

        return {
            fillColor: getColor(avgProgress),
            weight: 1.5,
            opacity: 1,
            color: 'white', // เส้นขอบอำเภอสีขาว
            fillOpacity: 0.8
        };
    },
    onEachFeature: function(feature, layer) {
        // ส่วนการคลิกเพื่อเปิด Modal เหมือนเดิมที่คุณใช้อยู่
        const dName = feature.properties.amp_th || "ไม่ระบุชื่อ";
        layer.bindTooltip("อำเภอ" + dName);
        layer.on('click', function() {
            // โค้ดสร้าง modalHtml และเรียก openModal ที่คุณมีอยู่
        });
    }
}).addTo(map);

            } catch (err) {
                console.error(err);
                document.getElementById('map').innerHTML = `<div class="p-10 text-red-500 text-center font-bold">เกิดข้อผิดพลาด: ${err.message}</div>`;
            }
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
