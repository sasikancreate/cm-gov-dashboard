<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #eef4fb;
            --bg2: #ffffff;
            --bg3: #f0f6ff;
            --accent: #1a56a0;
            --accent2: #10a97a;
            --text: #1a2a4a;
            --text2: #5a7090;
            --border: #d0dff0;
        }
         * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; }
        .header {
            background: #eef4fb;
            border-bottom: 1px solid #d0dff0;
            padding: 28px 32px 24px;
            text-align: center;
        }
        .header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
        
        .main { padding: 20px 28px; display: flex; flex-direction: column; gap: 18px; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .stat-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px; position: relative; overflow: hidden;
            transition: transform 0.2s; box-shadow: 0 2px 12px rgba(26,86,160,0.07);
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(26,86,160,0.12); }
        .stat-card::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
            border-radius: 0 0 14px 14px;
            background: var(--c, var(--accent));
        }
        .stat-card::before { display: none; }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); margin-bottom: 6px; }
        .stat-val { font-size: 26px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
        .stat-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
        .stat-emoji { position: absolute; right: 16px; top: 14px; font-size: 24px; opacity: 0.2; }
        .content-grid {
            display: grid; grid-template-columns: 1fr 400px; gap: 18px; height: 640px;
        }
         .map-wrap {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; position: relative; box-shadow: 0 2px 12px rgba(26,86,160,0.07);
            display: flex; flex-direction: column;
        }
        .map-section-head {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-size: 15px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 10px; background: var(--bg2);
        }
        .map-section-head::before {
            content: ''; width: 5px; height: 22px; background: var(--accent);
            border-radius: 3px; flex-shrink: 0;
        }
        .map-bar {
            display: none;
        }
         .map-bar h3 { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
        #map { width: 100%; flex: 1; min-height: 0; }
        
        .panel {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 2px 12px rgba(26,86,160,0.07);
        }
        .panel-head {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            background: var(--bg2); font-size: 15px; font-weight: 700; color: var(--text);
            letter-spacing: 0;
        }
        .panel-body { flex: 1; overflow-y: auto; padding: 14px; }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text2); text-align: center; gap: 10px; }
        .empty .ico { font-size: 44px; opacity: 0.25; }
        .empty p { font-size: 13px; line-height: 1.7; }
        
        .d-title { font-size: 19px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
        .d-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .chip { background: var(--bg3); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--text2); }
        .chip strong { color: var(--text); }
        .proj-group { margin-bottom: 14px; }
        .proj-head {
            background: var(--bg3); border-left: 3px solid var(--accent2);
            padding: 8px 12px; border-radius: 0 8px 8px 0; margin-bottom: 6px;
        }
        .proj-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; }
        .proj-budget { font-size: 11px; color: var(--accent2); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
        
        .sa-item {
            background: rgba(15,23,42,0.6); border: 1px solid rgba(51,65,85,0.5);
            border-radius: 8px; padding: 9px 11px; margin-bottom: 5px;
        }
        .sa-desc { font-size: 11.5px; line-height: 1.55; color: var(--text); margin-bottom: 5px; }
        .sa-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
        .sa-bgt { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-weight: 600; }
        .sa-st { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: 500; }
        .sa-unit { font-size: 10.5px; color: var(--text2); }
        .legend {
            position: absolute; bottom: 14px; left: 14px; z-index: 500;
            background: rgba(255,255,255,0.95); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 13px; font-size: 11px; color: var(--text2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .legend strong { color: var(--text); display: block; margin-bottom: 5px; font-size: 11px; }
        .lg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
        .lg-dot { width: 14px; height: 10px; border-radius: 2px; }
        
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; height: auto; }
            .map-wrap { height: 420px; }
            .panel { height: 480px; }
            .main { padding: 14px; }
        }
        #map { 
    height: 550px; 
    width: 100%;
    background: #f8fafc; /* สีพื้นหลังระหว่างรอโหลด */
    border-radius: 12px; 
    z-index: 10; 
}
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ
                </h3>
                <div id="map" class="bg-gray-100 w-full"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        async function initDashboard() {
            try {
                // โหลดข้อมูล (ตรวจสอบชื่อไฟล์ให้ตรงกับใน GitHub)
                const [dataRes, geoRes] = await Promise.all([
                    fetch('data.json'),
                    fetch('districts.json')
                ]);
                const projects = await dataRes.json();
                const geoData = await geoRes.json();

                // สร้างแผนที่ (ID 'map' จะตรงกับ div ข้างบน)
                const map = L.map('map').setView([18.7883, 98.9853], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // ฟังก์ชันกำหนดสี (Heat Map Logic)
                function getStyle(feature) {
                    const dName = feature.properties.amphoe_th || feature.properties.NAME_2;
                    // ลองสุ่มสีหรือเช็คสถานะจากข้อมูลจริง
                    return {
                        fillColor: '#3b82f6', 
                        weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                    };
                }

                // วาดแผนที่
                L.geoJSON(geoData, {
                    style: getStyle,
                    onEachFeature: function(feature, layer) {
                        const dName = feature.properties.amphoe_th || feature.properties.NAME_2;
                        layer.on('click', function() {
                            const detailDiv = document.getElementById('detail-content');
                            detailDiv.innerHTML = `<h4 class="text-xl font-bold text-blue-900 mb-4">${dName}</h4>`;
                            // เพิ่ม Logic กรองข้อมูลโครงการตรงนี้
                        });
                    }
                }).addTo(map);

            } catch (err) {
                console.error("Error loading data:", err);
            }
        }

        // เริ่มทำงานเมื่อโหลดหน้าเสร็จ
        window.addEventListener('load', initDashboard);
    </script><script>
    async function initDashboard() {
        try {
            // โหลดข้อมูล
            const [dataRes, geoRes] = await Promise.all([
                fetch('data.json'),
                fetch('districts.json')
            ]);
            
            const projects = await dataRes.json();
            const geoData = await geoRes.json();

            // สร้างแผนที่ใน id="map"
            const map = L.map('map').setView([18.7883, 98.9853], 8);
            
            // เพิ่มคำสั่งนี้เพื่อให้แผนที่คำนวณขนาดใหม่ทันที
            setTimeout(() => {
                map.invalidateSize();
            }, 500);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            L.geoJSON(geoData, {
                style: {
                    fillColor: '#3b82f6', 
                    weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                }
            }).addTo(map);

        } catch (err) {
            console.error("แผนที่โหลดไม่สำเร็จ เพราะ:", err);
        }
    }

    // เรียกใช้เมื่อหน้าเว็บพร้อม
    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
