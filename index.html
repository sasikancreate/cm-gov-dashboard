<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 600px; width: 100%; background: white; border-radius: 24px; z-index: 10; border: 1px solid #e2e8f0; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .info.legend { padding: 15px; font-size: 12px; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-radius: 15px; line-height: 20px; color: #334155; border: 1px solid #e2e8f0; }
        .info.legend i { width: 18px; height: 18px; float: left; margin-right: 10px; opacity: 0.9; border-radius: 4px; }
        .legend-title { font-weight: 700; margin-bottom: 8px; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="project-modal" class="fixed inset-0 z-[9999] hidden bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden shadow-2xl flex flex-col relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 p-2 bg-white/80 hover:bg-gray-200 rounded-full shadow-md">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-body" class="overflow-y-auto p-6 md:p-12 bg-slate-50"></div>
            <div class="p-4 bg-white border-t flex justify-center">
                <button onclick="closeModal()" class="px-12 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-700 shadow-lg">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
       <h1 class="text-2xl md:text-4xl font-black text-center text-slate-900 mb-10 tracking-tight">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ 2568
       </h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">จำนวนโครงการหลัก</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">งบประมาณรวมทั้งสิ้น</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-5xl font-black text-emerald-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">บาท</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-white p-6 rounded-[40px] shadow-sm border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800 flex items-center gap-3">
                <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                แผนที่แสดงผลรายอำเภอ (Heat Map)
            </h3>
            <div id="map"></div>
        </div>
    </div>

    <script>
    function getColor(d) {
        return d >= 100 ? '#28A745' : d >= 90 ? '#85C88A' : d >= 80 ? '#A7D948' :
               d >= 70  ? '#F4D03F' : d >= 60 ? '#FFF176' : d >= 50 ? '#FFB74D' :
               d >= 30  ? '#FF8A65' : d >= 20 ? '#E57373' : d >= 10 ? '#EF9A9A' :
                          '#6C757D'; 
    }

    function openModal(htmlContent) {
        document.getElementById('modal-body').innerHTML = htmlContent;
        document.getElementById('project-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('project-modal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    async function initDashboard() {
        try {
            console.log("เริ่มโหลดข้อมูล...");
            const [dataRes, geoRes] = await Promise.all([
                fetch('https://sasikancreate.github.io/cm-gov-dashboard/data.json?v=' + Date.now()),
                fetch('https://sasikancreate.github.io/cm-gov-dashboard/districts.json?v=' + Date.now())
            ]);
            
            if (!dataRes.ok || !geoRes.ok) throw new Error("Fetch failed");
            
            const rawData = await dataRes.json();
            const geoData = await geoRes.json();
            console.log("โหลด GeoJSON สำเร็จ:", geoData);

            const projectData = Array.isArray(rawData) ? rawData : (rawData.Sheet1 || []);
            
            // อัปเดตตัวเลขสรุป
            document.getElementById('total-projects').innerText = [...new Set(projectData.map(p => p.Project_Name))].length;
            document.getElementById('total-budget').innerText = "342,906,200";

            // สร้าง Map Instance
            const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([18.82, 99.05], 8.3);
            document.getElementById('map').style.backgroundColor = 'white';

            // วาดแผนที่
            const geoLayer = L.geoJSON(geoData, {
                style: function(feature) {
                    // ตรวจสอบชื่ออำเภอ (ลองเปลี่ยนเป็นชื่อคีย์อื่นถ้าแผนที่ยังไม่ขึ้น)
                    const dName = (feature.properties.amp_th || feature.properties.name || "").trim();
                    const projectsInDist = projectData.filter(p => 
                        p.Districts && p.Districts.replace('อำเภอ','').trim() === dName.replace('อำเภอ','').trim());
                    
                    let avg = 0;
                    if(projectsInDist.length > 0) {
                        const total = projectsInDist.reduce((sum, p) => {
                            let val = 10; const s = p.Status || "";
                            if (s.includes("GFMIS")) val = 100;
                            else if (s.includes("ลงนาม")) val = 90;
                            else if (s.includes("ดำเนินการ")) val = 50;
                            else if (s.includes("ยกเลิก")) val = 0;
                            return sum + val;
                        }, 0);
                        avg = total / projectsInDist.length;
                    }
                    return { fillColor: getColor(avg), weight: 2, opacity: 1, color: 'white', fillOpacity: 0.9 };
                },
                onEachFeature: function(feature, layer) {
                    const dName = (feature.properties.amp_th || feature.properties.name || "ไม่ระบุ").trim();
                    layer.bindTooltip("อำเภอ " + dName);
                    layer.on('click', function() {
                        // ... โค้ดส่วนคลิก Modal เหมือนเดิม ...
                    });
                }
            }).addTo(map);

            // ขยายให้พอดีจังหวัด
            map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });

            // ใส่ Legend
            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = () => {
                const div = L.DomUtil.create('div', 'info legend');
                div.innerHTML = '<div class="legend-title">ความคืบหน้า</div>';
                [0, 10, 20, 30, 50, 60, 70, 80, 90, 100].forEach(g => {
                    div.innerHTML += `<i style="background:${getColor(g)}"></i> ${g}%<br>`;
                });
                return div;
            };
            legend.addTo(map);

        } catch (err) { 
            console.error("เกิดข้อผิดพลาด:", err);
            document.getElementById('map').innerHTML = `<div class="p-10 text-red-500 text-center">โหลดแผนที่ไม่ได้: ${err.message}</div>`;
        }
    }
    window.onload = initDashboard;
    </script>
</body>
</html>
