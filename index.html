<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { 
            height: 550px; 
            width: 100%; 
            background: #f1f5f9; 
            border-radius: 12px; 
            z-index: 10; 
        }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            ต้นแบบ Dashboard ติดตามผลการดำเนินงานตามแผนปฏิบัติราชการ ปีงบประมาณ พ.ศ. 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-blue-900">14</span>
                    <span class="text-lg text-gray-600 font-semibold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 border border-gray-100">
                <p class="text-gray-500 text-sm font-medium uppercase tracking-wider">งบประมาณรวม</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-4xl font-black text-emerald-700">342,906,200</span>
                    <span class="text-lg text-gray-600 font-semibold">บาท</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    แผนที่แสดงผลรายอำเภอ (Heat Map)
                </h3>
                <div id="map"></div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 overflow-y-auto" style="max-height: 610px;">
                <h3 class="text-lg font-bold mb-4 text-gray-700">รายละเอียดโครงการ</h3>
                <div id="detail-content" class="text-gray-500 text-center py-20 italic">
                    กรุณาคลิกเลือกอำเภอในแผนที่<br>เพื่อดูรายละเอียด
                </div>
            </div>
        </div>
    </div>

<script>
async function initDashboard() {
    try {
        // 1. โหลดข้อมูล (ใส่ Cache-Control เพื่อให้ข้อมูลสดใหม่เสมอ)
        const [dataRes, geoRes] = await Promise.all([
            fetch('data.json?v=' + Date.now()),
            fetch('districts.json?v=' + Date.now())
        ]);

        const projectData = await dataRes.json();
        const geoData = await geoRes.json();

        // 2. สร้างแผนที่
        const map = L.map('map').setView([18.7883, 98.9853], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // บังคับคำนวณขนาด (ป้องกันแผนที่แหว่ง)
        setTimeout(() => { map.invalidateSize(); }, 500);

        // 3. ฟังก์ชันระบายสี Heat Map
        function getStyle(feature) {
            const dName = feature.properties.amphoe_th || "";
            // ค้นหาว่าอำเภอนี้มีกี่โครงการ
            const districtProjects = projectData.filter(p => p.Districts && p.Districts.includes(dName));
            
            return {
                fillColor: districtProjects.length > 0 ? '#10b981' : '#cbd5e1', // เขียวถ้ามีงาน, เทาถ้าไม่มี
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        // 4. วาดแผนที่และใส่ฟังก์ชันคลิก
        L.geoJSON(geoData, {
            style: getStyle,
            onEachFeature: function(feature, layer) {
                // ดึงชื่ออำเภอจากไฟล์พิกัด
                const dName = feature.properties.amphoe_th || "ไม่ระบุชื่อ";
                
                // แสดงชื่ออำเภอสั้นๆ เมื่อเอาเมาส์วาง
                layer.bindTooltip("อำเภอ" + dName);

                // เมื่อคลิกที่พื้นที่อำเภอ
                layer.on('click', function() {
                    const detailDiv = document.getElementById('detail-content');
                    
                    // กรองข้อมูลโครงการที่ตรงกับชื่ออำเภอนี้
                    const filtered = projectData.filter(p => p.Districts && p.Districts.includes(dName));

                    // สร้าง HTML สำหรับแสดงผลด้านขวา
                    let html = `<h4 class="text-2xl font-bold text-blue-900 mb-2">อำเภอ${dName}</h4>`;
                    html += `<p class="text-sm text-gray-500 mb-4 font-semibold">พบทั้งหมด ${filtered.length} โครงการ</p>`;
                    html += `<hr class="mb-4 border-blue-100">`;

                    if (filtered.length === 0) {
                        html += `<div class="py-10 text-center text-gray-400 italic">ไม่มีข้อมูลโครงการในพื้นที่นี้</div>`;
                    } else {
                        filtered.forEach(p => {
                            // เลือกสีพื้นหลังตามสถานะ (ตัวอย่าง)
                            const statusBg = p.Status.includes('ดำเนินการ') ? 'bg-emerald-50 border-emerald-200' : 'bg-blue-50 border-blue-200';
                            
                            html += `
                                <div class="mb-4 p-4 rounded-xl border ${statusBg} shadow-sm">
                                    <div class="text-xs font-bold text-blue-600 mb-1">${p.Project_ID || ''}</div>
                                    <div class="font-bold text-gray-800 text-sm mb-2 leading-snug">${p.Project_Name}</div>
                                    <div class="flex justify-between items-end mt-2">
                                        <div class="text-[11px] text-gray-500">
                                            <span class="block font-medium">สถานะ: ${p.Status}</span>
                                            <span class="block">หน่วยงาน: ${p.Responsible_Unit || '-'}</span>
                                        </div>
                                        <div class="text-sm font-bold text-emerald-700">
                                            ${Number(p.Budget || 0).toLocaleString()} ฿
                                        </div>
                                    </div>
                                </div>`;
                        });
                    }
                    detailDiv.innerHTML = html;
                });
            }
        }).addTo(map);

        console.log("เชื่อมข้อมูลสำเร็จ!");

    } catch (err) {
        console.error("ผิดพลาด:", err);
    }
}

window.addEventListener('load', initDashboard);
</script>
</body>
</html>
