<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard เชียงใหม่ 2568</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #f8fafc; }
        #map { height: 600px; width: 100%; background: #f1f5f9; border-radius: 24px; z-index: 10; border: 1px solid #e2e8f0; }
        .stat-card { transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="project-modal" class="fixed inset-0 z-[9999] hidden bg-black bg-opacity-60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[40px] overflow-hidden shadow-2xl flex flex-col relative animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-50 p-2 bg-white/80 hover:bg-gray-200 rounded-full shadow-md transition-all">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modal-body" class="overflow-y-auto p-6 md:p-12 bg-slate-50"></div>
            <div class="p-4 bg-white border-t flex justify-center">
                <button onclick="closeModal()" class="px-12 py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-700 shadow-lg transition-all">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl md:text-4xl font-black text-center text-slate-900 mb-10 tracking-tight">
            Dashboard ติดตามแผนปฏิบัติราชการเชียงใหม่ 2568
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">จำนวนโครงการหลัก</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-projects" class="text-5xl font-black text-blue-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">โครงการ</span>
                </div>
            </div>
            <div class="stat-card bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">งบประมาณรวมทั้งสิ้น</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="total-budget" class="text-5xl font-black text-emerald-600">0</span>
                    <span class="text-xl text-slate-400 font-bold">บาท</span>
                </div>
            </div>
        </div>

        <div class="w-full bg-white p-6 rounded-[40px] shadow-sm border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-slate-800 flex items-center gap-3">
                <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                แผนที่แสดงผลรายอำเภอ (Heat Map)
            </h3>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- ฟังก์ชันควบคุม Modal ---
        function openModal(htmlContent) {
            document.getElementById('modal-body').innerHTML = htmlContent;
            document.getElementById('project-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('project-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // ปิด Modal เมื่อคลิกพื้นหลัง
        window.onclick = function(event) {
            const modal = document.getElementById('project-modal');
            if (event.target == modal) closeModal();
        }

        async function initDashboard() {
            try {
                const [dataRes, geoRes] = await Promise.all([
                    fetch('./data.json?v=' + Date.now()),
                    fetch('./districts.json?v=' + Date.now())
                ]);

                if (!dataRes.ok || !geoRes.ok) throw new Error("โหลดไฟล์ JSON ไม่สำเร็จ");

                const projectData = await dataRes.json();
                const geoData = await geoRes.json();

                // 1. สรุปตัวเลข
                const uniqueNames = [...new Set(projectData.map(p => p.Project_Name))];
                document.getElementById('total-projects').innerText = uniqueNames.length;
                document.getElementById('total-budget').innerText = "342,906,200";

                // 2. สร้างแผนที่
                const map = L.map('map').setView([18.7883, 98.9853], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                setTimeout(() => { map.invalidateSize(); }, 500);

                // 3. วาดแผนที่จาก districts.json
                L.geoJSON(geoData, {
                    style: function(feature) {
                        const dName = (feature.properties.amp_th || "").trim();
                        const hasProj = projectData.some(p => p.Districts && p.Districts.includes(dName));
                        return {
                            fillColor: hasProj ? '#10b981' : '#cbd5e1',
                            weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const dName = feature.properties.amp_th || "ไม่ระบุชื่อ";
                        layer.bindTooltip("อำเภอ" + dName);

                        layer.on('click', function() {
                            const cleanName = dName.replace('อำเภอ', '').trim();
                            const filtered = projectData.filter(p => p.Districts && p.Districts.includes(cleanName));

                            const groups = {};
                            filtered.forEach(p => {
                                if (!groups[p.Project_Name]) {
                                    let prog = 10; let col = "#EF9A9A"; 
                                    const s = p.Status || "";
                                    if (s.includes("GFMIS")) { prog = 100; col = "#28A745"; }
                                    else if (s.includes("ลงนามแล้วอยู่ระหว่างนำเข้า")) { prog = 90; col = "#85C88A"; }
                                    else if (s.includes("ประกาศผลผู้ชนะ")) { prog = 80; col = "#A7D948"; }
                                    else if (s.includes("อุทธรณ์ผล")) { prog = 70; col = "#F4D03F"; }
                                    else if (s.includes("ประกาศเชิญชวน")) { prog = 60; col = "#FFF176"; }
                                    else if (s.includes("ดำเนินการ (In Progress)")) { prog = 50; col = "#FFB74D"; }
                                    else if (s.includes("รอการอนุมัติรายงานขอซื้อ")) { prog = 30; col = "#FF8A65"; }
                                    else if (s.includes("ร่างขอบเขตงาน") || s.includes("TOR")) { prog = 20; col = "#E57373"; }
                                    else if (s.includes("อนุมัติโครงการ")) { prog = 10; col = "#EF9A9A"; }
                                    else if (s.includes("ยกเลิก")) { prog = 0; col = "#6C757D"; }

                                    groups[p.Project_Name] = { 
                                        budget: Number(p.Budget || 0), 
                                        status: s, 
                                        unit: p.Responsible_Unit,
                                        progress: prog,
                                        color: col
                                    };
                                }
                            });

                            const projectKeys = Object.keys(groups);
                            const totalDistBudget = Object.values(groups).reduce((s, p) => s + p.budget, 0);
                            const avgProgress = projectKeys.length > 0 ? Math.round(Object.values(groups).reduce((s, p) => s + p.progress, 0) / projectKeys.length) : 0;

                            let modalHtml = `
                                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-slate-900 p-10 rounded-[40px] text-white shadow-xl">
                                    <div>
                                        <h2 class="text-4xl font-black mb-1">อำเภอ${dName}</h2>
                                        <p class="opacity-60 text-sm tracking-wide">รายงานความคืบหน้าโครงการประจำปี 2568</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-6xl font-black text-emerald-400">${avgProgress}%</span>
                                        <span class="text-xs font-bold opacity-60 leading-tight">ผลการดำเนินงาน<br>ภาพรวม</span>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 flex items-center gap-6 shadow-sm">
                                        <div class="p-4 bg-blue-50 rounded-2xl text-blue-600 font-black text-3xl">${projectKeys.length}</div>
                                        <div><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">โครงการ</p><p class="font-bold text-slate-800 text-xl">รายการทั้งหมด</p></div>
                                    </div>
                                    <div class="bg-white p-8 rounded-[32px] border border-slate-100 flex items-center gap-6 shadow-sm">
                                        <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600 font-black text-2xl">฿</div>
                                        <div><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">งบประมาณ</p><p class="font-bold text-slate-800 text-xl">${totalDistBudget.toLocaleString()} บาท</p></div>
                                    </div>
                                </div>

                                <h3 class="text-xl font-black text-slate-800 mb-6 px-2">รายการโครงการในพื้นที่</h3>
                                <div class="grid grid-cols-1 gap-4">
                            `;

                            projectKeys.forEach((name, index) => {
                                const p = groups[name];
                                modalHtml += `
                                    <div class="bg-white p-8 rounded-[32px] border border-slate-50 flex flex-col md:flex-row gap-6 items-center shadow-sm">
                                        <div class="w-12 h-12 rounded-2xl bg-slate-50 text-slate-300 flex items-center justify-center text-xl font-black flex-shrink-0">${index + 1}</div>
                                        <div class="flex-1 w-full">
                                            <h4 class="text-lg font-bold text-slate-800 mb-4">${name}</h4>
                                            <div class="flex flex-wrap gap-6 text-xs text-slate-500 mb-6">
                                                <div class="flex items-center gap-2">หน่วยงาน: <b class="text-slate-700">${p.unit}</b></div>
                                                <div class="flex items-center gap-2">งบประมาณ: <b class="text-slate-900">฿${p.budget.toLocaleString()}</b></div>
                                            </div>
                                            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden mb-3">
                                                <div class="h-full transition-all duration-1000" style="width: ${p.progress}%; background-color: ${p.color}"></div>
                                            </div>
                                            <div class="flex justify-between text-[10px] font-black tracking-widest uppercase">
                                                <span class="text-slate-400">สถานะ: ${p.status}</span>
                                                <span style="color: ${p.color}">${p.progress}%</span>
                                            </div>
                                        </div>
                                    </div>`;
                            });

                            modalHtml += `</div>`;
                            openModal(modalHtml);
                        });
                    }
                }).addTo(map);

            } catch (err) {
                console.error(err);
                document.getElementById('map').innerHTML = `<div class="p-10 text-red-500 text-center font-bold">เกิดข้อผิดพลาด: ${err.message}</div>`;
            }
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
